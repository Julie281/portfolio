<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Julie Laurent | Language selection</title>
  <meta name="description" content="Choose your preferred language for Julie Laurent's multilingual portfolio." />
  <meta name="robots" content="noindex,follow" />
  <link rel="alternate" hreflang="es" href="https://julie281.github.io/es/" />
  <link rel="alternate" hreflang="en" href="https://julie281.github.io/en/" />
  <link rel="alternate" hreflang="fr" href="https://julie281.github.io/fr/" />
  <link rel="alternate" hreflang="x-default" href="https://julie281.github.io/es/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script>
    (function() {
      var lang = (navigator.language || navigator.userLanguage || 'es').toLowerCase();
      var target = '/es/';
      if (lang.startsWith('fr')) target = '/fr/';
      else if (lang.startsWith('en')) target = '/en/';
      window.location.replace(target);
    })();
  </script>
</head>
<body class="selector-body">
  <main class="selector-card">
    <div class="eyebrow">Julie Laurent</div>
    <h1>Choose your language</h1>
    <p>This portfolio is available in Spanish, English and French. If automatic redirection does not work, choose your preferred version below.</p>
    <div class="selector-grid">
      <a href="/es/">Español<span>Versión principal</span></a>
      <a href="/en/">English<span>International version</span></a>
      <a href="/fr/">Français<span>Version française</span></a>
    </div>
  </main>
</body>
</html>
